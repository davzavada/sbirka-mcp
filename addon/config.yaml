name: e-Sbírka MCP Server
version: "0.4.0"
slug: sbirka_mcp
description: >-
  MCP server for the Czech e-Sbírka / e-Legislativa public REST API
  (legal research and regulation search). Exposes a Streamable HTTP MCP endpoint.
url: https://github.com/davzavada/sbirka-mcp
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
startup: services
boot: auto
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: MCP endpoint (Streamable HTTP, path /)
options:
  access_key: ""
  oauth_enabled: false
  oauth_password: ""
  public_url: ""
  log_level: info
schema:
  access_key: password?
  oauth_enabled: bool
  oauth_password: password?
  public_url: str?
  log_level: list(debug|info|warning|error)
